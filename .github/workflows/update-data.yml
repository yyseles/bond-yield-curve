name: 每日自动更新国债利率数据并部署

on:
  schedule:
    # 北京时间 20:00 (UTC 12:00) 主运行，避开 GitHub Actions 高峰
    - cron: '0 12 * * 1-5'
    # 北京时间 23:00 (UTC 15:00) 兜底运行，确保当日数据已发布
    - cron: '0 15 * * 1-5'
  workflow_dispatch:  # 允许手动触发
  push:               # 每次推送也自动部署
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests

      - name: 抓取最新国债利率数据
        run: python ci_update.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json || echo "No changes to data.json"
          git diff --cached --quiet || (
            echo "有新的数据更新，正在提交..."
            git commit -m "自动更新数据: $(date +'%Y-%m-%d')"
            git push
          )

      - name: 设置 Pages
        uses: actions/configure-pages@v5

      - name: 上传站点文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
