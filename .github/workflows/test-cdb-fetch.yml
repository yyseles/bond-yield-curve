name: Test CDB Fetch

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Test searchYc API
        run: |
          python -c "
          import json, urllib.parse, urllib.request

          ENDPOINT = 'https://yield.chinabond.com.cn/cbweb-mn/yc/searchYc'
          REFERER = 'https://yield.chinabond.com.cn/cbweb-mn/yield_main?locale=zh_CN'
          CDB_ID = '8a8b2ca037a7ca910137bfaa94fa5057'

          for test_date in ['2026-07-10', '2026-07-09', '2026-07-08']:
              params = {
                  'xyzSelect': 'txy', 'workTimes': test_date, 'dxbj': '0',
                  'qxll': '1', 'yqqxN': 'N', 'yqqxK': 'K',
                  'ycDefIds': CDB_ID, 'wrjxCBFlag': '0', 'locale': 'zh_CN',
              }
              body = urllib.parse.urlencode(params).encode('utf-8')
              req = urllib.request.Request(ENDPOINT, data=body, headers={
                  'User-Agent': 'Mozilla/5.0', 'Referer': REFERER,
                  'Content-Type': 'application/x-www-form-urlencoded',
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read().decode('utf-8'))
                  if data:
                      sd = data[0].get('seriesData', [])
                      exact = {int(t): v for t, v in sd if abs(t-round(t))<1e-6 and 1<=t<=50}
                      print(f'{test_date}: OK {len(sd)} pts, {len(exact)} integer years, 1Y={exact.get(1)}, 10Y={exact.get(10)}')
                  else:
                      print(f'{test_date}: empty array')
              except Exception as e:
                  print(f'{test_date}: FAIL - {e}')
          "
